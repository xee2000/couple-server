app = "couple-server"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "couple_uploads"
  destination = "/data/uploads"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
